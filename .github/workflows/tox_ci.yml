name: Continious Integration
on: pull_request
jobs:
  black:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run black
        uses: actions/setup-python@v6
        with:
          python-version: 3.11
      - name: install black
        run: pip install "black"
      - name: run black
        run: black --check pymzml
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
      - name: install tox
        run: pip install tox
      - name: Tox
        run: tox -e py
